<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 540" width="820" height="540">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 22px 'Segoe UI', sans-serif; fill:#111827; }
      .label { font: 14px 'Segoe UI', sans-serif; fill:#111827; }
      .small { font: 12px 'Segoe UI', sans-serif; fill:#374151; }
      .stock { fill:#eef2ff; stroke:#6366f1; stroke-width:2; }
      .path { fill:none; stroke:#0f766e; stroke-width:4; }
      .axis { stroke:#6b7280; stroke-width:1.5; stroke-dasharray:5 4; }
      .dim { stroke:#111827; stroke-width:1.5; marker-start:url(#arrow); marker-end:url(#arrow); }
      .guide { stroke:#9ca3af; stroke-width:1; stroke-dasharray:4 3; }
      .start { fill:#dc2626; }
    </style>
  </defs>

  <text x="24" y="34" class="title">MILL_CONTOUR Profile (Top View)</text>

  <!-- scale: 1 unit = 6 px -->
  <rect x="110" y="90" width="600" height="480" class="stock"/>
  <text x="120" y="112" class="label">Stock: 100 x 80</text>
  <text x="120" y="132" class="small">axis.origin = [0,0,0], dir = +Z</text>

  <line x1="410" y1="90" x2="410" y2="570" class="axis"/>
  <line x1="110" y1="330" x2="710" y2="330" class="axis"/>
  <text x="416" y="106" class="small">v+</text>
  <text x="688" y="324" class="small">u+</text>
  <circle cx="410" cy="330" r="3.5" fill="#374151"/>
  <text x="420" y="348" class="small">(u,v)=(0,0)</text>

  <!-- contour: rectangle 50x30 with R5 corners -->
  <path class="path"
        d="
          M 260 240
          H 530
          A 30 30 0 0 1 560 270
          V 390
          A 30 30 0 0 1 530 420
          H 290
          A 30 30 0 0 1 260 390
          V 270
          A 30 30 0 0 1 290 240
          Z
        "/>

  <circle cx="260" cy="240" r="6" class="start"/>
  <text x="178" y="230" class="label">start (-25, +15)</text>

  <line x1="320" y1="240" x2="380" y2="240" class="dim"/>
  <line x1="560" y1="310" x2="560" y2="350" class="dim"/>
  <line x1="470" y1="420" x2="410" y2="420" class="dim"/>
  <line x1="260" y1="350" x2="260" y2="300" class="dim"/>
  <text x="392" y="232" class="small">cut direction</text>

  <line x1="570" y1="260" x2="635" y2="220" class="guide"/>
  <text x="640" y="220" class="label">R5 fillet</text>

  <line x1="260" y1="455" x2="560" y2="455" class="dim"/>
  <line x1="260" y1="442" x2="260" y2="468" stroke="#111827" stroke-width="1"/>
  <line x1="560" y1="442" x2="560" y2="468" stroke="#111827" stroke-width="1"/>
  <text x="385" y="448" class="label">50</text>

  <line x1="595" y1="240" x2="595" y2="420" class="dim"/>
  <line x1="582" y1="240" x2="608" y2="240" stroke="#111827" stroke-width="1"/>
  <line x1="582" y1="420" x2="608" y2="420" stroke="#111827" stroke-width="1"/>
  <text x="603" y="335" class="label">30</text>

  <rect x="24" y="430" width="760" height="90" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="36" y="456" class="label">Machining Info</text>
  <text x="36" y="480" class="small">depth = 8.0 (from top z=20 down to z=12)</text>
  <text x="36" y="500" class="small">millContour.axis.origin = [50, 40, 20], dir = [0, 0, -1]</text>
</svg>
